server:
  port: 8080

spring:
  application:
    name: mall-gateway

  cloud:
    nacos:
      discovery:
        server-addr: 192.168.1.102:8848

    gateway:
      routes:
        - id: user-service
          uri: lb://mall-user
          predicates:
            - Path=/user/**,/product/**

  data:
    redis:
      host: 192.168.1.102
      port: 6379
      password:
      database: 0

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.cloud.loadbalancer: DEBUG